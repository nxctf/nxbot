services:
  nxbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nxbot-app
    ports:
      - "${PORT:-7000}:${PORT:-7000}"
    volumes:
      - nxbot-data:/app/data
    environment:
      - PORT=${PORT:-7000}
      - DATABASE_PATH=/app/data/nxbot.db
      - JWT_SECRET=${JWT_SECRET}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:$$PORT/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  nxbot-data:
    driver: local
