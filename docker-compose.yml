services:
  nxbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nxbot-app
    ports:
      - "3000:3000"
    volumes:
      - nxbot-data:/app/data
    environment:
      - DATABASE_PATH=/app/data/nxbot.db
      - JWT_SECRET=${JWT_SECRET}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  nxbot-data:
    driver: local
